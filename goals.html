<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Goals - FundFlow.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex selection:bg-black selection:text-white">
    
    <!-- Sidebar -->
    <app-sidebar></app-sidebar>

    <div class="flex-grow flex flex-col min-h-screen">
        
        <!-- Private Header Navbar -->
        <header class="bg-white border-b border-gray-100 py-4 px-8 flex justify-between items-center sticky top-0 z-40">
            <h2 class="text-xl font-bold tracking-tight text-black md:hidden">FundFlow.</h2>
            <div class="hidden md:block"></div>
            
            <div class="flex items-center gap-5 relative">
                <button class="text-gray-400 hover:text-black transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                </button>
                <button id="profile-menu-btn" class="flex items-center gap-3 focus:outline-none group">
                    <div class="w-9 h-9 rounded-full bg-black text-white flex items-center justify-center font-bold text-sm transition-transform group-hover:scale-105" id="user-avatar-initial"></div>
                    <div class="text-sm font-semibold text-black hidden sm:block transition-colors group-hover:text-gray-600">
                        <span id="user-display-name">...</span>
                        <i class="fa-solid fa-chevron-down text-[10px] ml-1 text-gray-400 transition-transform" id="profile-chevron"></i>
                    </div>
                </button>

                <div id="profile-dropdown" class="absolute right-0 top-1.5 mt-10 w-56 bg-white border border-gray-100 rounded-xl shadow-[0_10px_40px_rgb(0,0,0,0.08)] py-2 hidden z-50 origin-top-right transform transition-all opacity-0 scale-95">
                    <div class="px-5 py-3 border-b border-gray-50 mb-1">
                        <p class="text-xs text-gray-500 font-medium mb-0.5">Signed in as</p>
                        <p id="user-display-email" class="text-sm font-bold text-black truncate w-full"></p>
                    </div>
                    <div class="border-t border-gray-50 mt-1 pt-1">
                        <button id="logout-btn" class="w-full text-left px-5 py-2.5 text-sm text-red-600 hover:bg-red-50 hover:text-red-700 transition-colors font-semibold flex items-center gap-2">
                            <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i> Log out
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow p-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-black">Financial Goals</h1>
                    <p class="text-sm text-gray-500 mt-1">Track your progress to your next big purchase.</p>
                </div>
                <button id="open-goal-modal" class="bg-black text-white px-5 py-2.5 rounded-full text-sm font-bold shadow-md hover:bg-gray-800 transition shadow-lg hover:-translate-y-0.5 inline-flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> New Goal
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="goals-list-container">
                <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.04)] animate-pulse">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-12 h-12 bg-gray-200 rounded-2xl w-full mb-6 relative"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Goal Modal -->
    <div id="goal-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-gray-900/40 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl w-full max-w-md mx-4 overflow-hidden shadow-2xl scale-95 transform transition-transform duration-300" id="goal-modal-content">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h3 class="font-extrabold text-xl text-black">New Goal</h3>
                <button id="close-goal-modal" class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:bg-gray-100 hover:text-black transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="add-goal-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Goal Name</label>
                        <input type="text" id="goal-name" class="input-elegant" placeholder="E.g. New Car, Vacation" required>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Target Amount</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-gray-400">Rs.</span>
                            <input type="number" id="goal-target" step="0.01" class="input-elegant pl-12 text-lg font-bold" placeholder="0.00" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Deadline (Optional)</label>
                        <input type="date" id="goal-deadline" class="input-elegant">
                    </div>

                    <button type="submit" id="goal-submit-btn" class="btn-elegant mt-6 w-full text-base py-3">
                        <span id="goal-submit-text">Create Goal</span>
                        <svg id="goal-submit-spinner" class="hidden animate-spin ml-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div id="toast"></div>

    <script src="js/components/app-sidebar.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/goals.js"></script>
</body>
</html>
