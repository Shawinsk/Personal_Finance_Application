<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - FundFlow.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
    <!-- Reusable Header Component -->
    <app-header></app-header>

    <main class="flex-grow flex items-center justify-center p-6">
      <div
        class="w-full max-w-md bg-white rounded-2xl p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100"
      >
        <div class="text-center mb-10">
          <h1 class="text-3xl font-bold tracking-tight mb-2">Welcome back</h1>
          <p class="text-gray-500 text-sm">
            Enter your credentials to access your account.
          </p>
        </div>

        <form id="login-form" class="space-y-5">
          <div>
            <label
              for="email"
              class="block text-sm font-medium text-gray-700 mb-1.5 hover:text-black transition"
              >Email address</label
            >
            <input
              type="email"
              id="email"
              class="input-elegant"
              placeholder="name@example.com"
              required
            />
          </div>

          <div>
            <div class="flex justify-between items-center mb-1.5">
              <label
                for="password"
                class="block text-sm font-medium text-gray-700 hover:text-black transition"
                >Password</label
              >
              <a
                href="#"
                class="text-xs font-semibold text-gray-500 hover:text-black transition-colors"
                >Forgot password?</a
              >
            </div>
            <input
              type="password"
              id="password"
              class="input-elegant"
              placeholder="••••••••"
              required
            />
          </div>

          <button type="submit" id="login-btn" class="btn-elegant mt-8">
            <span id="login-text">Sign In</span>
            <svg
              id="login-spinner"
              class="hidden animate-spin ml-2 h-4 w-4 text-white"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-500">
          Don't have an account?
          <a
            href="signup.html"
            class="font-semibold text-black hover:underline underline-offset-4"
            >Sign up for free</a
          >
        </div>
      </div>
    </main>

    <!-- Reusable Footer Component -->
    <app-footer></app-footer>

    <div id="toast"></div>

    <!-- Scripts -->
    <script src="js/components/app-header.js"></script>
    <script src="js/components/app-footer.js"></script>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
