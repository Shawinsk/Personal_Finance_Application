<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundFlow - Elegant Personal Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col selection:bg-black selection:text-white">
    <!-- Reusable Header Component -->
    <app-header></app-header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-3xl mx-auto py-20 px-4 sm:px-6 lg:px-8">
            <span class="inline-block py-1 px-3 rounded-full bg-gray-100 text-sm font-semibold text-gray-800 mb-6 border border-gray-200 shadow-sm">
                Next-generation finance app ✨
            </span>
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-8 text-black leading-tight">
                Take control of your <br class="hidden md:block"/> money, <span class="text-transparent bg-clip-text bg-gradient-to-r from-gray-700 to-black">effortlessly.</span>
            </h1>
            <p class="text-lg md:text-xl text-gray-500 mb-10 max-w-2xl mx-auto leading-relaxed">
                Track your expenses, manage your accounts, and achieve your financial goals with the most elegant personal finance tracker.
            </p>
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                <a href="signup.html" class="w-full sm:w-auto px-8 py-3.5 bg-black text-white text-base font-bold rounded-lg hover:bg-gray-800 transition-all shadow-lg hover:shadow-xl hover:-translate-y-0.5">
                    Start for free
                </a>
                <a href="login.html" class="w-full sm:w-auto px-8 py-3.5 bg-white text-black border border-gray-200 text-base font-bold rounded-lg hover:bg-gray-50 transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5">
                    Log in
                </a>
            </div>
            
            <div class="mt-20 border border-gray-100 rounded-3xl overflow-hidden shadow-[0_20px_50px_rgb(0,0,0,0.06)] transform transition hover:scale-[1.01] duration-500 relative bg-white">
                <!-- Decorative reflection/gradient -->
                <div class="absolute inset-x-0 top-0 h-1 object-cover bg-gradient-to-r from-transparent via-gray-300 to-transparent opacity-50"></div>
                <div class="p-4 bg-gray-50 border-b border-gray-100 flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-400"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                    <div class="w-3 h-3 rounded-full bg-green-400"></div>
                </div>
                <div class="p-8">
                    <!-- Abstract mockup of UI -->
                    <div class="h-8 w-1/4 bg-gray-100 rounded-md mb-6"></div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <div class="h-32 bg-gray-50 rounded-xl border border-gray-100"></div>
                        <div class="h-32 bg-gray-50 rounded-xl border border-gray-100"></div>
                        <div class="h-32 bg-gray-50 rounded-xl border border-gray-100"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Reusable Footer Component -->
    <app-footer></app-footer>

    <!-- Scripts -->
    <script src="js/components/app-header.js"></script>
    <script src="js/components/app-footer.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
